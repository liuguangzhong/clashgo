<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="./assets/image/logo.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClashGo</title>
  <style>
    :root {
      --initial-bg: #f5f5f5;
      --initial-text: #333;
      --initial-spinner-track: #e3e3e3;
      --initial-spinner-top: #3498db;
      --bg-color: var(--initial-bg);
      --text-color: var(--initial-text);
      --spinner-track: var(--initial-spinner-track);
      --spinner-top: var(--initial-spinner-top);
      color-scheme: light;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --initial-bg: #2e303d;
        --initial-text: #ffffff;
        --initial-spinner-track: #3a3a3a;
        --initial-spinner-top: #0a84ff;
        --bg-color: var(--initial-bg);
        --text-color: var(--initial-text);
        --spinner-track: var(--initial-spinner-track);
        --spinner-top: var(--initial-spinner-top);
        color-scheme: dark;
      }
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--text-color);
    }

    #root {
      width: 100%;
      height: 100%;
    }

    #initial-loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity 0.3s ease;
    }

    #initial-loading-overlay[data-hidden="true"] {
      opacity: 0;
      pointer-events: none;
    }

    .initial-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--spinner-track);
      border-top: 3px solid var(--spinner-top);
      border-radius: 50%;
      animation: initial-spin 1s linear infinite;
    }

    @keyframes initial-spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="initial-loading-overlay">
    <div class="initial-spinner"></div>
    <div style="font-size: 14px; opacity: 0.7; margin-top: 20px">
      Loading ClashGo...
    </div>
  </div>
  <div id="root"></div>
  <script>
    // 5秒后强制移除 loading overlay（即使 React 未成功加载）
    setTimeout(function () {
      var overlay = document.getElementById('initial-loading-overlay');
      if (overlay) {
        overlay.dataset.hidden = 'true';
        setTimeout(function () { overlay.remove(); }, 300);
        console.warn('[ClashGo] Loading overlay force-removed after 5s timeout');
      }
    }, 5000);
    // 捕获全局JS错误并显示
    window.onerror = function (msg, url, line) {
      console.error('[ClashGo] Global error:', msg, url, line);
      var overlay = document.getElementById('initial-loading-overlay');
      if (overlay) {
        overlay.innerHTML = '<div style="color:red;padding:20px;text-align:center;font-size:14px;">' +
          '<b>ClashGo Error</b><br/>' + msg + '<br/>' + url + ':' + line + '</div>';
      }
    };
  </script>
  <script type="module" src="./main.tsx"></script>
</body>

</html>
